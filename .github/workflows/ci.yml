name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      # Executable SwiftPM target (menu-bar app), zero dependencies — a clean
      # `swift build` is the compile gate for every change.
      - name: swift build
        run: swift build
