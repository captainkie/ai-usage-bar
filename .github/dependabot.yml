version: 2
updates:
  # Keep GitHub Actions (checkout, codeql) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # SwiftPM. The app is dependency-free today; this future-proofs it (and flags
  # any dependency that sneaks in) without changing that stance.
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
